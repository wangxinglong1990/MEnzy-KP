task: kcat

dataset:
  path: data/master/kcat.csv

model:
  param_grid:
    n_estimators: [300]
    max_depth: [null, 30]
    min_samples_split: [2]
    min_samples_leaf: [1]
  random_state: 42
  n_jobs: 6

train:
  test_size: 0.2

features:
  esm_model_name: "esmc_300m"
  esm_embed_dim: 960
  esm_batch_size: 200
  smiles_seq_len: 220
  smiles_embed_dim: 1024

files:
  dataset_filename: "kcat.csv"
  features_pkl: "kcat_features.pkl"
  model_save: "kcat_predictor.joblib"
  results_save: "kcat_model_metrics.json"
