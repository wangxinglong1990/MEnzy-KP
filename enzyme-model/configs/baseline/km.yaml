task: km

dataset:
  path: data/master/km.csv

model:
  param_grid:
    n_estimators: [100, 200, 300]
    max_depth: [null, 20, 30]
    min_samples_split: [2, 5]
    min_samples_leaf: [1, 3]
  random_state: 42
  n_jobs: -1

train:
  test_size: 0.2

features:
  esm_model_name: "esmc_300m"
  esm_embed_dim: 960
  esm_batch_size: 200
  smiles_seq_len: 220
  smiles_embed_dim: 1024

files:
  dataset_filename: "km.csv"
  features_pkl: "km_features.pkl"
  model_save: "km_predictor.joblib"
  results_save: "km_model_metrics.json"
